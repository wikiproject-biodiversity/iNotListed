name: Run Project-Only Report

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  run-project-only:
    if: contains(github.event.issue.title, '[Wikiblitz]')
    runs-on: docker
    container:
      image: code.forgejo.org/oci/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends jq
          pip install requests matplotlib

      - name: Parse issue form
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          printf '%s' "$ISSUE_BODY" | python scripts/parse_issue.py >> "$GITHUB_OUTPUT"

      - name: Run iNotWiki.py
        id: run
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PROJECT_ID: ${{ steps.parse.outputs.project_id }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_ID" ]; then
            echo "No project_id parsed from issue body; aborting."
            exit 1
          fi
          ISSUE_FOLDER="reports/issue-${ISSUE_NUMBER}"
          mkdir -p "$ISSUE_FOLDER"

          REPORT_PATH=$(python iNotWiki.py --project_id "$PROJECT_ID" --output-folder "$ISSUE_FOLDER")
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Commit report folder
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "forgejo-actions"
          git config user.email "forgejo-actions@noreply.${{ github.server_url }}"
          git add "reports/issue-${ISSUE_NUMBER}"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add project-only report for issue #${ISSUE_NUMBER}"
            # Use the per-job token to push back.
            git push "$(echo "${{ github.server_url }}" | sed "s|https://|https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@|")/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          fi

      - name: Post Markdown report as issue comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_PATH: ${{ steps.run.outputs.report_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$REPORT_PATH" ]; then
            echo "No report file at $REPORT_PATH; skipping comment."
            exit 0
          fi
          MAX=60000
          BODY=$(head -c "$MAX" "$REPORT_PATH")
          if [ "$(wc -c < "$REPORT_PATH")" -gt "$MAX" ]; then
            SUFFIX=$(printf '\n\n%s\n_Report truncated. Full file: `%s` in this repository._' '---' "$REPORT_PATH")
            BODY="${BODY}${SUFFIX}"
          fi
          jq -n --arg body "$BODY" '{body: $body}' \
            | curl -fsS -X POST \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                -H "Content-Type: application/json" \
                --data-binary @- \
                "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments"
